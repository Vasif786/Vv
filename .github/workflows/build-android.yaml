name: Build Android Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 7
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install Dependencies
        run: npm install

      - name: Patch Dependencies
        run: |
          if [ -f "./ci/patch-deps" ]; then
            node ./ci/patch-deps
          elif [ -f "./ci/patch-deps.js" ]; then
            node ./ci/patch-deps.js
          else
            echo "patch-deps not found, skipping"
          fi

      - name: Build JS Bundle
        run: npm run bundle-rnjs

      - name: Set Version
        id: build-config
        run: |
          echo "version_name=$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK Licenses
        run: yes | sdkmanager --licenses || true

      - name: Grant Gradle Permission
        run: chmod +x gradlew

      - name: Build Release APK
        run: |
          USE_SPLITBUILD=1 \
          CI_BUILD=1 \
          CI_VERSION_NAME="${{ steps.build-config.outputs.version_name }}" \
          ./gradlew assembleRelease --no-daemon --stacktrace --info

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: |
            app/build/outputs/apk/release/*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.build-config.outputs.version_name }}
          name: Release v${{ steps.build-config.outputs.version_name }}
          files: |
            app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
